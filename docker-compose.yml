version: "3.9"

networks:
  nac_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: nac_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - nac_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nac_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - nac_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: nac_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8000:8000"
    networks:
      - nac_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5

  freeradius:
    image: freeradius/freeradius-server:latest-3.2
    container_name: nac_freeradius
    restart: unless-stopped
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    volumes:
      - ./freeradius/config/radiusd.conf:/etc/freeradius/3.0/radiusd.conf
      - ./freeradius/config/clients.conf:/etc/freeradius/3.0/clients.conf
      - ./freeradius/config/mods-enabled/sql:/etc/freeradius/3.0/mods-enabled/sql
      - ./freeradius/config/mods-enabled/rest:/etc/freeradius/3.0/mods-enabled/rest
      - ./freeradius/config/sites-enabled/default:/etc/freeradius/3.0/sites-enabled/default
    networks:
      - nac_network
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    command: freeradius -X
